version: "3.9"

services:
  backend:
    image: fmr0/docker-admin
    user: root
    depends_on:
      - db
    ports:
      - "443:3000"
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: mydatabase
      DB_SCHEMA: public
      DB_USER: dbuser
      DB_PASSWORD: securepassword
      JWT_SECRET: changeme-jwt-secret
      SSL: "true"
      SSL_KEY: /certs/key.pem
      SSL_CERT: /certs/cert.pem
      PORT: 3000
      ENABLE_DB_LOGS: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./certs:/certs:ro
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: dbuser
      POSTGRES_PASSWORD: securepassword
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db-data:
